name: 🚀 Deploy — Legis Connect → legisconnect.com.br

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões necessárias para GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy rode por vez
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🏗️ Build de produção
        run: npm run build
        env:
          NODE_ENV: production

      - name: 🔧 Criar .htaccess para SPA routing
        run: |
          cat > dist/.htaccess << 'HTACCESS'
          Options -MultiViews
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [QSA,L]
          Options -Indexes
          <IfModule mod_headers.c>
              Header always set X-Frame-Options "SAMEORIGIN"
              Header always set X-Content-Type-Options "nosniff"
              Header always set X-XSS-Protection "1; mode=block"
              Header always set Referrer-Policy "strict-origin-when-cross-origin"
          </IfModule>
          <IfModule mod_deflate.c>
              AddOutputFilterByType DEFLATE text/html text/plain text/css application/javascript application/json
          </IfModule>
          <IfModule mod_expires.c>
              ExpiresActive On
              ExpiresByType application/javascript "access plus 1 year"
              ExpiresByType text/css "access plus 1 year"
              ExpiresByType image/png "access plus 1 year"
              ExpiresByType image/jpg "access plus 1 year"
              ExpiresByType image/svg+xml "access plus 1 year"
              ExpiresByType text/html "access plus 0 seconds"
          </IfModule>
          HTACCESS

      - name: 📋 Verificar estrutura do build
        run: |
          echo "=== Arquivos em dist/ ==="
          ls -la dist/
          echo "=== Tamanho total ==="
          du -sh dist/
          echo "=== CNAME ==="
          cat dist/CNAME || echo "CNAME não encontrado!"

      - name: ⚙️ Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: 🌐 Deploy → legisconnect.com.br
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
