/* SPA routing fallback — GitHub Pages serve 404.html como fallback */
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Legis Connect</title>
  <script>
    // Redireciona para index.html preservando a rota atual
    // Técnica: encoda a rota como query string e decodifica no index.html
    var segmentCount = 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
